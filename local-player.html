<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Immersive Lyric Engine - Local Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 24px;
      font-weight: 300;
      color: #00e5ff;
      margin-bottom: 30px;
      letter-spacing: 4px;
    }
    .input-group {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 800px;
      margin-bottom: 30px;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #00e5ff33;
      border-radius: 6px;
      background: #12121a;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
    }
    input[type="text"]:focus {
      border-color: #00e5ff;
    }
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      background: linear-gradient(135deg, #00e5ff, #ff00aa);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.3s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .lyric-input-group {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 800px;
      margin-bottom: 20px;
    }
    textarea {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ff00aa33;
      border-radius: 6px;
      background: #12121a;
      color: #e0e0e0;
      font-size: 12px;
      font-family: monospace;
      outline: none;
      resize: vertical;
      min-height: 80px;
    }
    textarea:focus { border-color: #ff00aa; }
    .status {
      color: #888;
      font-size: 12px;
      margin-bottom: 20px;
    }
    .status.error { color: #ff4444; }
    .status.success { color: #44ff88; }
    .status.connecting { color: #ffaa00; }
    audio { display: none; }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
    .lyric-display {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      pointer-events: none;
    }
    .lyric-text {
      font-size: 28px;
      font-weight: 300;
      color: #fff;
      text-shadow: 0 0 30px #00e5ff, 0 0 60px #00e5ff44;
      letter-spacing: 2px;
      min-height: 40px;
    }
    .lyric-translation {
      font-size: 14px;
      color: #ffffff99;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>IMMERSIVE LYRIC ENGINE</h1>

  <div class="input-group">
    <input type="text" id="audioUrl" placeholder="粘贴 .m4a 音频链接...">
    <button id="playBtn">播放</button>
  </div>

  <div class="lyric-input-group">
    <textarea id="lyricInput" placeholder="粘贴从 F12 Network 捕获的歌词 JSON（可选）..."></textarea>
    <button id="loadLyricBtn" style="height: fit-content;">加载歌词</button>
  </div>

  <div class="status" id="status">等待音频链接...</div>

  <div class="lyric-display">
    <div class="lyric-text" id="lyricText"></div>
    <div class="lyric-translation" id="lyricTranslation"></div>
  </div>

  <audio id="audio" crossorigin="anonymous"></audio>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    const WS_URL = 'ws://localhost:8765';
    const PARTICLE_COUNT = 8000;
    const SYNC_TOLERANCE_MS = 200;

    const audioUrlInput = document.getElementById('audioUrl');
    const playBtn = document.getElementById('playBtn');
    const lyricInput = document.getElementById('lyricInput');
    const loadLyricBtn = document.getElementById('loadLyricBtn');
    const statusEl = document.getElementById('status');
    const lyricTextEl = document.getElementById('lyricText');
    const lyricTranslationEl = document.getElementById('lyricTranslation');
    const audioEl = document.getElementById('audio');

    let bassEnergy = 0;
    let midEnergy = 0;
    let highEnergy = 0;
    let running = false;

    let lines = [];
    let translations = [];
    let cursor = 0;
    let lastText = null;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.z = 1;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 0);
    document.body.appendChild(renderer.domElement);

    const clock = new THREE.Clock();

    const vertexShader = `
      attribute float aSize;
      attribute float aAlpha;
      attribute vec3 aColor;
      uniform float uTime;
      uniform float uBassEnergy;
      uniform float uMidEnergy;
      uniform float uHighEnergy;
      uniform float uFade;
      varying float vAlpha;
      varying vec3 vColor;
      void main() {
        vAlpha = aAlpha * uFade;
        vColor = aColor;
        vec3 pos = position;
        float id = float(gl_VertexID);
        float phase = id * 0.0173;
        pos.x += sin(uTime * 1.1 + phase) * 0.04 * uFade;
        pos.y += cos(uTime * 0.9 + phase * 1.3) * 0.03 * uFade;
        float dist = length(pos.xy);
        float bassImpulse = uBassEnergy * 0.6 * smoothstep(0.0, 0.5, dist);
        float midImpulse = uMidEnergy * 0.3 * sin(uTime * 3.0 + phase * 2.0) * smoothstep(0.2, 0.6, dist);
        float angle = atan(pos.y, pos.x);
        pos.x += cos(angle) * (bassImpulse + midImpulse);
        pos.y += sin(angle) * (bassImpulse + midImpulse);
        vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
        gl_PointSize = aSize * (300.0 / -mvPos.z);
        gl_Position = projectionMatrix * mvPos;
      }
    `;

    const fragmentShader = `
      precision highp float;
      uniform float uBassEnergy;
      uniform float uHighEnergy;
      varying float vAlpha;
      varying vec3 vColor;
      void main() {
        vec2 coord = gl_PointCoord - 0.5;
        float d = length(coord) * 2.0;
        if (d > 1.0) discard;
        float glow = 1.0 - d;
        glow = pow(glow, 1.5);
        vec3 color = vColor;
        color = mix(color, vec3(0.7, 0.9, 1.0), uBassEnergy * 0.5);
        color = mix(color, vec3(1.0, 0.5, 0.8), uHighEnergy * 0.3);
        float alpha = vAlpha * glow;
        gl_FragColor = vec4(color, alpha);
      }
    `;

    const layers = [];
    const LAYER_COUNT = 5;
    const LAYER_DEPTH_SPACING = 0.04;

    function hexToRGB(hex) {
      const r = parseInt(hex.slice(1, 3), 16) / 255;
      const g = parseInt(hex.slice(3, 5), 16) / 255;
      const b = parseInt(hex.slice(5, 7), 16) / 255;
      return { r, g, b };
    }

    const CYAN = hexToRGB('#00e5ff');
    const MAGENTA = hexToRGB('#ff00aa');
    const WHITE = hexToRGB('#ffffff');

    function createParticleGeometry(count, zDepth, scale) {
      const positions = new Float32Array(count * 3);
      const alphas = new Float32Array(count);
      const colors = new Float32Array(count * 3);
      const sizes = new Float32Array(count);

      for (let i = 0; i < count; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const r = 0.3 + Math.random() * 0.3;

        positions[i * 3] = r * Math.sin(phi) * Math.cos(theta) * scale;
        positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta) * scale;
        positions[i * 3 + 2] = zDepth + (Math.random() - 0.5) * 0.02;

        const t = Math.random();
        let c = t < 0.4 ? CYAN : (t < 0.7 ? MAGENTA : WHITE);

        colors[i * 3] = c.r;
        colors[i * 3 + 1] = c.g;
        colors[i * 3 + 2] = c.b;

        alphas[i] = 0.6 + Math.random() * 0.4;
        sizes[i] = 0.003 * (0.5 + Math.random());
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('aAlpha', new THREE.BufferAttribute(alphas, 1));
      geometry.setAttribute('aColor', new THREE.BufferAttribute(colors, 3));
      geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

      return geometry;
    }

    function buildParticleLayers() {
      const particlesPerLayer = Math.floor(PARTICLE_COUNT / LAYER_COUNT);

      for (let i = 0; i < LAYER_COUNT; i++) {
        const depth = (i - LAYER_COUNT / 2) * LAYER_DEPTH_SPACING;
        const scale = 1.0 + (i - LAYER_COUNT / 2) * 0.05;

        const geometry = createParticleGeometry(particlesPerLayer, depth, scale);

        const material = new THREE.ShaderMaterial({
          vertexShader,
          fragmentShader,
          uniforms: {
            uTime: { value: 0 },
            uBassEnergy: { value: 0 },
            uMidEnergy: { value: 0 },
            uHighEnergy: { value: 0 },
            uFade: { value: 0 },
          },
          transparent: true,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
        });

        const points = new THREE.Points(geometry, material);
        scene.add(points);

        layers.push({ points, geometry, material });
      }
    }

    function textToBitmap(text) {
      const canvas = document.createElement('canvas');
      canvas.width = 1024;
      canvas.height = 1024;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = 'black';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = 'white';
      ctx.font = 'bold 160px "PingFang SC", "Microsoft YaHei", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      return ctx.getImageData(0, 0, canvas.width, canvas.height);
    }

    function sampleBitmap(data) {
      const { width, height, data: pixels } = data;
      const N = Math.floor(PARTICLE_COUNT * 0.7);

      const brightPixels = [];
      for (let i = 0; i < width * height; i++) {
        const brightness = pixels[i * 4];
        if (brightness > 128) {
          const x = (i % width) / width;
          const y = 1 - (i / width | 0) / height;
          brightPixels.push([x - 0.5, y - 0.5]);
        }
      }

      if (brightPixels.length === 0) return [];

      const targets = [];
      for (let k = 0; k < N; k++) {
        const idx = Math.floor(Math.random() * brightPixels.length);
        const [bx, by] = brightPixels[idx];
        targets.push([
          bx + (Math.random() - 0.5) * 0.008,
          by + (Math.random() - 0.5) * 0.008,
        ]);
      }

      return targets;
    }

    function scatterParticlesToPositions(layer, targets) {
      const { geometry } = layer;
      const positions = geometry.attributes.position.array;
      const count = positions.length / 3;
      const scale = 0.5;

      for (let i = 0; i < count; i++) {
        const isTextParticle = i < targets.length;
        const [tx, ty] = isTextParticle
          ? targets[i]
          : [(Math.random() - 0.5) * 0.6, (Math.random() - 0.5) * 0.3];

        positions[i * 3] = tx * scale + (Math.random() - 0.5) * 0.01;
        positions[i * 3 + 1] = ty * scale + (Math.random() - 0.5) * 0.01;
      }

      geometry.attributes.position.needsUpdate = true;
    }

    function rebuildParticles(text) {
      const bitmap = textToBitmap(text);
      const centers = sampleBitmap(bitmap);

      for (const layer of layers) {
        scatterParticlesToPositions(layer, centers);
      }
    }

    const LRC_LINE_RE = /(\[(?:\d+:\d{2}[.:]\d{2,3})\])+([^\[]*)/g;
    const TIMECODE_RE = /\[(\d+):(\d{2})[.:](\d{2,3})\]/;

    function timecodeToMs(tag) {
      const m = TIMECODE_RE.exec(tag);
      if (!m) return NaN;
      const minutes = parseInt(m[1], 10);
      const seconds = parseInt(m[2], 10);
      const msStr = m[3].length === 2 ? m[3] + '0' : m[3];
      const millis = parseInt(msStr, 10);
      return (minutes * 60 + seconds) * 1000 + millis;
    }

    function parseLRC(lrc) {
      if (!lrc || typeof lrc !== 'string') return [];
      const parsed = [];
      let match;
      LRC_LINE_RE.lastIndex = 0;
      while ((match = LRC_LINE_RE.exec(lrc)) !== null) {
        const fullMatch = match[0];
        const text = match[2].trim();
        const tagMatches = fullMatch.match(/\[\d+:\d{2}[.:]\d{2,3}\]/g) || [];
        for (const tag of tagMatches) {
          const time = timecodeToMs(tag);
          if (!isNaN(time)) {
            parsed.push({ time, text });
          }
        }
      }
      parsed.sort((a, b) => a.time - b.time);
      return parsed;
    }

    function extractLyrics(json) {
      if (!json || typeof json !== 'object') return null;
      if (!json.lrc || typeof json.lrc.lyric !== 'string') return null;
      const main = parseLRC(json.lrc.lyric);
      const translation = json.tlyric?.lyric ? parseLRC(json.tlyric.lyric) : [];
      return { main, translation };
    }

    function binarySearchCursor(targetMs) {
      let lo = 0;
      let hi = lines.length - 1;
      while (lo < hi) {
        const mid = (lo + hi + 1) >> 1;
        if (lines[mid].time <= targetMs) {
          lo = mid;
        } else {
          hi = mid - 1;
        }
      }
      return lo;
    }

    function advanceCursor(currentMs) {
      if (lines.length === 0) return;

      const effectiveMs = currentMs + SYNC_TOLERANCE_MS;

      while (
        cursor < lines.length - 1 &&
        lines[cursor + 1].time <= effectiveMs
      ) {
        cursor++;
      }

      if (lines[cursor].time > effectiveMs) {
        cursor = binarySearchCursor(effectiveMs);
      }

      const line = lines[cursor];
      if (line.text !== lastText) {
        lastText = line.text;
        lyricTextEl.textContent = line.text;
        lyricTranslationEl.textContent = translations[cursor]?.text || '';
        rebuildParticles(line.text || '♪');
      }
    }

    let fadeAlpha = 0;
    let targetAlpha = 1;

    function render() {
      if (!running) return;

      requestAnimationFrame(render);

      const elapsed = clock.getElapsedTime();
      const currentMs = audioEl.currentTime * 1000;

      if (audioEl.duration > 0) {
        advanceCursor(currentMs);
      }

      const fadeDiff = targetAlpha - fadeAlpha;
      if (Math.abs(fadeDiff) > 0.01) {
        fadeAlpha += fadeDiff * 0.1;
      }

      for (const layer of layers) {
        const uniforms = layer.material.uniforms;
        uniforms.uTime.value = elapsed;
        uniforms.uBassEnergy.value = bassEnergy;
        uniforms.uMidEnergy.value = midEnergy;
        uniforms.uHighEnergy.value = highEnergy;
        uniforms.uFade.value = Math.max(0, fadeAlpha);
      }

      renderer.render(scene, camera);
    }

    let ws = null;
    let wsReconnectDelay = 1000;

    async function connectWebSocket() {
      try {
        setStatus('正在连接音频服务...', 'connecting');
        ws = new WebSocket(WS_URL);

        ws.onopen = () => {
          setStatus('已连接音频服务，播放音乐吧！', 'success');
          wsReconnectDelay = 1000;
        };

        ws.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);
            if (data.error) {
              setStatus('音频服务错误: ' + data.error, 'error');
              return;
            }
            bassEnergy = Math.min(1.0, data.bass * 10 || 0);
            midEnergy = Math.min(1.0, data.mid * 20 || 0);
            highEnergy = Math.min(1.0, data.high * 30 || 0);
          } catch (e) {
            console.warn('WS parse error:', e);
          }
        };

        ws.onclose = () => {
          setStatus('音频服务已断开，刷新页面重连', 'error');
          ws = null;
          if (running) {
            setTimeout(connectWebSocket, wsReconnectDelay);
            wsReconnectDelay = Math.min(wsReconnectDelay * 2, 10000);
          }
        };

        ws.onerror = (err) => {
          setStatus('WebSocket 连接失败', 'error');
        };

      } catch (err) {
        setStatus('无法连接音频服务: ' + err.message, 'error');
      }
    }

    playBtn.addEventListener('click', async () => {
      const url = audioUrlInput.value.trim();
      if (!url) {
        setStatus('请输入音频链接', 'error');
        return;
      }

      try {
        audioEl.src = url;
        audioEl.volume = 1;
        await audioEl.play();
        setStatus('播放中...', 'success');

        if (!running) {
          running = true;
          render();
        }
      } catch (err) {
        setStatus('播放失败: ' + err.message, 'error');
      }
    });

    loadLyricBtn.addEventListener('click', () => {
      const input = lyricInput.value.trim();
      if (!input) {
        setStatus('请输入歌词 JSON', 'error');
        return;
      }

      try {
        const json = JSON.parse(input);
        const lyrics = extractLyrics(json);
        if (!lyrics || lyrics.main.length === 0) {
          setStatus('歌词格式无效或为空', 'error');
          return;
        }

        lines = lyrics.main;
        translations = lyrics.translation;
        cursor = 0;
        lastText = null;

        if (lines[0]) {
          lyricTextEl.textContent = lines[0].text;
          rebuildParticles(lines[0].text || '♪');
        }

        setStatus(`已加载 ${lines.length} 行歌词`, 'success');
      } catch (err) {
        setStatus('JSON 解析失败: ' + err.message, 'error');
      }
    });

    function setStatus(msg, type = '') {
      statusEl.textContent = msg;
      statusEl.className = 'status ' + type;
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    buildParticleLayers();
    setStatus('就绪，先启动 Python 音频服务，再输入音频链接', '');

    connectWebSocket();
  </script>
</body>
</html>
